<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calendário de Férias</title>

<style>

body{
font-family:Inter,Arial;
background:#f5f7fb;
margin:0;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

/* SPINNER */

.loaderContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.spinner{
width:60px;
height:60px;
border:6px solid #e5e7eb;
border-top:6px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h2{
margin:0;
text-transform:capitalize;
}

button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* LAYOUT */

.layout{
display:flex;
gap:20px;
}

.calendar{
flex:1;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
}

.weekday{
text-align:center;
padding:10px;
font-weight:bold;
background:#e5e7eb;
}

.day{
border:1px solid #e5e7eb;
min-height:110px;
padding:5px;
background:white;
}

.today{
background:#dbeafe;
}

.feriado{
background:#fee2e2;
}

.dayNumber{
font-size:13px;
font-weight:bold;
}

.event{
font-size:11px;
padding:2px 4px;
border-radius:4px;
margin-top:2px;
color:white;
}

/* SIDEBAR */

.sidebar{
width:340px;
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:6px;
border-bottom:1px solid #e5e7eb;
text-align:left;
}

th{
background:#f1f5f9;
}

@media(max-width:900px){

.layout{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>

</head>

<body>

<div class="loaderContainer" id="loader">
<div class="spinner"></div>
</div>

<div class="container">

<div class="header">

<button onclick="prevMonth()">◀</button>

<h2 id="mes"></h2>

<div>
<button onclick="today()">Hoje</button>
<button onclick="nextMonth()">▶</button>
</div>

</div>

<div class="layout">

<div class="calendar">

<div class="grid" id="weekdays"></div>
<div class="grid" id="calendar"></div>

</div>

<div class="sidebar">

<h3>Férias Motoristas</h3>

<table>

<thead>
<tr>
<th>Motorista</th>
<th>Total</th>
<th>Marcado</th>
<th>Disponível</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

</div>

<script>

const url="https://script.google.com/macros/s/AKfycbxBzFYBU3lNvqaKzrOB_0dqGJoPz3n0Vu_MC6yLEklUCZhxlP09ilIlKJ-4xqxXV-sr/exec";

let dados;
let current=new Date();

let cores={};

const paleta=[
"#3b82f6","#ef4444","#22c55e","#f59e0b",
"#8b5cf6","#06b6d4","#e11d48","#10b981",
"#f97316","#14b8a6"
];

const weekdays=["Seg","Ter","Qua","Qui","Sex","Sab","Dom"];

weekdays.forEach(d=>{
let div=document.createElement("div");
div.className="weekday";
div.innerText=d;
document.getElementById("weekdays").appendChild(div);
});

fetch(url)
.then(r=>r.json())
.then(data=>{

dados=data;

data.motoristas.forEach((m,i)=>{
cores[m.nome]=paleta[i % paleta.length];
});

render();

/* esconder spinner */

document.getElementById("loader").style.display="none";

})
.catch(err=>{
console.log(err);
document.getElementById("loader").style.display="none";
});

function render(){

let year=current.getFullYear();
let month=current.getMonth();

let first=new Date(year,month,1);
let last=new Date(year,month+1,0);

document.getElementById("mes").innerText=
first.toLocaleString('pt',{month:'long'})+" "+year;

let cal=document.getElementById("calendar");
cal.innerHTML="";

let start=(first.getDay()+6)%7;

for(let i=0;i<start;i++){
cal.appendChild(document.createElement("div"));
}

for(let d=1;d<=last.getDate();d++){

let date=new Date(year,month,d);
let iso=date.toISOString().slice(0,10);

let cell=document.createElement("div");
cell.className="day";

if(date.toDateString()==new Date().toDateString()){
cell.classList.add("today");
}

if(dados.feriados.includes(iso)){
cell.classList.add("feriado");
}

let num=document.createElement("div");
num.className="dayNumber";
num.innerText=d;

cell.appendChild(num);

dados.motoristas.forEach(m=>{

if(m.dias.includes(iso)){

let ev=document.createElement("div");
ev.className="event";
ev.innerText=m.nome;
ev.style.background=cores[m.nome];

cell.appendChild(ev);

}

});

cal.appendChild(cell);

}

renderTabela();

}

function renderTabela(){

let html="";

dados.motoristas.forEach(m=>{

let marcado=m.dias.length;
let disponivel=m.saldo-marcado;

html+=`
<tr>
<td>${m.nome}</td>
<td>${m.saldo}</td>
<td>${marcado}</td>
<td>${disponivel}</td>
</tr>
`;

});

document.getElementById("tabela").innerHTML=html;

}

function prevMonth(){

current.setMonth(current.getMonth()-1);
render();

}

function nextMonth(){

current.setMonth(current.getMonth()+1);
render();

}

function today(){

current=new Date();
render();

}

</script>

</body>
</html>
